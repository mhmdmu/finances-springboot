spring:
  application:
    name: Finances
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  sql:
    init:
      mode: always

server:
  servlet:
    context-path: /api/v1

auth:
  jwt:
    secret-key: ${JWT_KEY}
    expiration-seconds: 900 # 15 minuets
